<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">
            <img src="./logo.svg" alt="Notebook Online logo" />
          </div>
          <p class="eyebrow">Notebook Online</p>
          <h1>轻量笔记本</h1>
          <p class="brand-copy">专注记录文字与图片，只保留本地保存与导出 Word。</p>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>笔记列表</h2>
            <button id="new-note-button" class="ghost-button" type="button">新建</button>
          </div>
          <div id="notes-list" class="notes-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>本地保存</h2>
          </div>
          <div class="local-save-panel">
            <p class="hint">点击右上角保存，会导出到根目录 `notes/` 文件夹。</p>
            <p class="hint">导出格式为 `.docx`，文件名使用当前笔记标题。</p>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <header class="workspace-head">
          <div class="title-wrap">
            <p class="workspace-kicker">Current Note</p>
            <input id="note-title" class="note-title" type="text" placeholder="输入笔记标题" />
            <p id="save-status" class="save-status">未保存</p>
          </div>

          <div class="actions">
            <section class="stopwatch" aria-label="秒表">
              <div class="stopwatch-display-wrap">
                <p id="stopwatch-display" class="stopwatch-display">00:00:00</p>
              </div>
              <div class="stopwatch-actions">
                <button id="stopwatch-toggle-button" class="icon-button" type="button" aria-label="开始或暂停秒表" title="开始 / 暂停">
                  <svg id="stopwatch-toggle-icon-play" class="icon-mark" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6.5v11l9-5.5-9-5.5Z" fill="currentColor"></path>
                  </svg>
                  <svg id="stopwatch-toggle-icon-pause" class="icon-mark hidden" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6h3v12H8zM13 6h3v12h-3z" fill="currentColor"></path>
                  </svg>
                </button>
                <button id="stopwatch-reset-button" class="icon-button" type="button" aria-label="清零秒表" title="清零">
                  <svg class="icon-mark" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5a7 7 0 1 1-6.3 3.96" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                    <path d="M7 4v4h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                  </svg>
                </button>
              </div>
            </section>
            <button id="save-note-button" class="primary-button" type="button">保存到本地</button>
          </div>
        </header>

        <section class="toolbar" aria-label="编辑工具栏">
          <div class="tool-group">
            <span class="tool-label">颜色</span>
            <button class="tool-button color-chip ink-red" data-command="foreColor" data-value="#b42318" type="button">红</button>
            <button class="tool-button color-chip ink-black" data-command="foreColor" data-value="#101828" type="button">黑</button>
            <button class="tool-button color-chip ink-blue" data-command="foreColor" data-value="#175cd3" type="button">蓝</button>
            <button class="tool-button highlight-chip" data-command="hiliteColor" data-value="#fff29d" type="button">高亮</button>
          </div>

          <div class="tool-group">
            <span class="tool-label">字号</span>
            <button class="tool-button" data-font-size="3" type="button">小</button>
            <button class="tool-button" data-font-size="5" type="button">中</button>
            <button class="tool-button" data-font-size="7" type="button">大</button>
          </div>

          <div class="tool-group">
            <span class="tool-label">格式</span>
            <button class="tool-button" data-command="bold" type="button">加粗</button>
            <button class="tool-button" data-command="italic" type="button">斜体</button>
            <button class="tool-button" data-command="removeFormat" type="button">清除</button>
          </div>
        </section>

        <section id="editor" class="editor" contenteditable="true" spellcheck="true">
          <p>在这里开始写笔记。</p>
        </section>
        <p class="editor-hint">支持直接粘贴图片，或把图片拖到编辑区。</p>
      </main>
    </div>

    <template id="note-item-template">
      <button class="note-item" type="button">
        <span class="note-item-title"></span>
        <span class="note-item-date"></span>
      </button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
